<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocalNotes - Sesli Not Tutucu</title>
    <meta name="description" content="Ses komutu ve manuel yazma ile hızlıca not tutun. Modern ve şık tasarımıyla en iyi not tutma deneyimi.">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VocalNotes">
    <meta property="og:title" content="VocalNotes - Sesli Not Tutucu">
    <meta property="og:description" content="Sesle veya yazarak not al, istediğin zaman eriş.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-card glass shadow-lg">
            <div class="auth-header">
                <i class="fa-solid fa-microphone-lines"></i>
                <h2>VocalNotes</h2>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <h3>Giriş Yap</h3>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="loginUser" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn-primary w-full">Giriş Yap</button>
                <p class="auth-footer">Hesabın yok mu? <a href="#" id="toRegister">Kayıt Ol</a></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display:none;">
                <h3>Kayıt Ol</h3>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="regUser" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPass" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn-primary w-full">Kayıt Ol</button>
                <p class="auth-footer">Zaten hesabın var mı? <a href="#" id="toLogin">Giriş Yap</a></p>
            </form>
        </div>
    </div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">

        <!-- HEADER -->
        <header>
            <div class="header-top">
                <div class="logo">
                    <i class="fa-solid fa-microphone-lines"></i>
                    <h1>VocalNotes</h1>
                </div>
                <div class="header-actions">
                    <button id="installBtn" class="btn-install glass" style="display:none;">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button id="settingsBtn" class="btn-icon-top glass settings-btn-large" title="Ayarlar">
                        <i class="fa-solid fa-gear"></i>
                        <span class="settings-text">Ayarlar</span>
                    </button>
                </div>
            </div>
            <p class="subtitle" id="appSubtitle">Aklındakileri sese dök veya yaz, biz saklarız.</p>
        </header>

        <!-- INPUT -->
        <section class="input-section">
            <div class="input-card glass">
                <div class="input-wrapper">
                    <textarea id="noteInput" placeholder="Notunuzu buraya yazın veya mikrofonu kullanın..." rows="3"></textarea>
                    <div class="char-counter" id="charCounter">0 karakter</div>
                    <div class="input-actions">
                        <div id="visualizer" class="recording-visualizer">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <button id="voiceBtn" class="btn-voice" title="Sesle Yaz" aria-label="Sesle not ekle">
                            <i class="fa-solid fa-microphone"></i>
                            <span class="pulse"></span>
                        </button>
                        <button id="addNoteBtn" class="btn-primary" aria-label="Not ekle">
                            <i class="fa-solid fa-plus"></i>
                            <span>Ekle</span>
                        </button>
                    </div>
                </div>
                <div id="statusMessage" class="status-message" aria-live="polite"></div>
            </div>
        </section>

        <!-- NOTES -->
        <section class="notes-section">
            <div class="section-header">
                <h2>Notlarım <span id="noteCount" class="note-count"></span></h2>
                <div class="header-controls">
                    <div class="search-box glass">
                        <i class="fa-solid fa-search"></i>
                        <input type="search" id="searchInput" placeholder="Notlarda ara..." aria-label="Notlarda ara">
                    </div>
                    <div class="sort-export">
                        <select id="sortSelect" class="sort-select glass" aria-label="Sıralama">
                            <option value="newest">En Yeni</option>
                            <option value="oldest">En Eski</option>
                            <option value="pinned">Sabitlenmiş</option>
                        </select>
                        <button id="exportBtn" class="btn-icon-top glass" title="Notları Dışa Aktar" aria-label="Dışa Aktar">
                            <i class="fa-solid fa-file-arrow-down"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="notesContainer" class="notes-grid"></div>

            <div id="emptyState" class="empty-state">
                <i class="fa-regular fa-note-sticky"></i>
                <p>Henüz hiç notun yok.<br>İlkini eklemeye ne dersin?</p>
            </div>
        </section>
    </main>

    <!-- Mobil FAB -->
    <button class="mobile-fab" id="mobileFab" aria-label="Sesle not ekle">
        <i class="fa-solid fa-microphone"></i>
        <span class="pulse"></span>
    </button>

    <!-- Düzenleme Modal -->
    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal glass">
            <div class="modal-header">
                <h3><i class="fa-solid fa-pen-to-square"></i> <span id="lblEditNote">Notu Düzenle</span></h3>
                <button class="btn-icon" id="closeModal" aria-label="Kapat">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <textarea id="editInput" rows="6"></textarea>
            <div class="modal-actions">
                <button id="cancelEdit" class="btn-secondary">İptal</button>
                <button id="saveEdit" class="btn-primary">
                    <i class="fa-solid fa-check"></i> <span id="lblSave">Kaydet</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Ayarlar Modal -->
    <div id="settingsModal" class="modal-overlay" style="display:none;">
        <div class="modal glass shadow-lg">
            <div class="modal-header">
                <h3><i class="fa-solid fa-gear"></i> <span id="lblSettings">Ayarlar</span></h3>
                <button class="btn-icon" id="closeSettings" aria-label="Kapat">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="settings-content">
                <div class="setting-item">
                    <label><i class="fa-solid fa-user-circle"></i> <span id="lblUserAccount">Hesap</span></label>
                    <div class="user-info glass p-3">
                        <span id="currentUserName" class="font-bold">Misafir</span>
                        <button id="logoutBtn" class="btn-icon btn-delete" title="Çıkış Yap">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </button>
                    </div>
                </div>

                <div class="setting-item">
                    <div class="theme-grid">
                        <button class="theme-btn active" data-theme="dark" title="Dark">
                            <span class="theme-preview dark"></span>
                        </button>
                        <button class="theme-btn" data-theme="light" title="Light">
                            <span class="theme-preview light"></span>
                        </button>
                        <button class="theme-btn" data-theme="midnight" title="Midnight">
                            <span class="theme-preview midnight"></span>
                        </button>
                    </div>
                </div>

                <div class="setting-item">
                    <label><i class="fa-solid fa-language"></i> <span id="lblLanguage">Dil Seçeneği</span></label>
                    <select id="langSelect" class="sort-select glass w-full">
                        <option value="tr">Türkçe</option>
                        <option value="en">English</option>
                    </select>
                    <p class="setting-desc" id="lblLangDesc">Ses tanıma dili seçilen dile göre ayarlanır.</p>
                </div>
            </div>

            <div class="modal-actions">
                <button id="closeSettingsBtn" class="btn-primary w-full">
                    <i class="fa-solid fa-check"></i> <span id="lblDone">Tamam</span>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
